<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Tacka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1 data-i18n="name">Michael Tacka</h1>
                <p class="tagline" data-i18n="tagline">Willkommen</p>
            </div>
        </header>

        <main>
            <section class="gallery">
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="globe.png" alt="World globe" class="gallery-img">
                    </div>
                    <div class="gallery-item">
                        <img src="beach.png" alt="Sunny beach sunset" class="gallery-img">
                    </div>
                </div>
            </section>

            <section class="about">
                <h2 data-i18n="about-title">Über mich</h2>
                <p data-i18n="about-text">Freut mich, Sie hier zu sehen. Diese Website ist noch im Aufbau. Für Fragen und Kontakt, bitte nutzen Sie die E-Mail-Adresse unten.</p>
            </section>

            <section class="contact">
                <h2 data-i18n="contact-title">Kontakt</h2>
                <p>
                    <a href="mailto:michael@tacka.de" class="email-link">
                        michael@tacka.de
                    </a>
                </p>
            </section>
        </main>

        <footer>
            <p data-i18n="footer">&copy; 2026 Michael Tacka. Alle Rechte vorbehalten.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
